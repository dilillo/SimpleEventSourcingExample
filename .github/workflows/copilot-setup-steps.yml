name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "3.1.x"

            - name: Restore dependencies
              run: dotnet restore

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Install Spec Kit
              run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git@v0.8.1
